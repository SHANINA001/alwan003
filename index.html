<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا | ألوان للطباعة والتصميم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* إعدادات المتغيرات للألوان */
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-secondary: #94a3b8;
            --logo-glow: rgba(99, 102, 241, 0.5);
            --transition-speed: 0.3s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* خلفية الرسوم المتحركة */
        #canvas-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* الحاوية الرئيسية */
        .main-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        /* تصميم البطاقة بتقنية الزجاج */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 30px 25px; /* تصغير الحشوة قليلاً لاستيعاب الأزرار الإضافية */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUpFade 0.8s ease-out forwards;
        }

        /* --- تصميم الشعار (LOGO) --- */
        .logo-container {
            margin-bottom: 20px;
            position: relative;
            display: inline-block;
        }

        .logo-image {
            width: 180px;
            height: 80px;
            object-fit: contain;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px var(--logo-glow);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255,255,255,0.05);
        }

        .logo-image:hover {
            transform: scale(1.05);
        }

        /* العناوين */
        h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-secondary);
            margin-bottom: 25px;
            font-size: 14px;
            line-height: 1.5;
        }

        /* حاوية الأزرار */
        .buttons-grid {
            display: flex;
            flex-direction: column;
            gap: 12px; /* تقليل المسافة بين الأزرار */
        }

        /* تصميم الأزرار */
        .social-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px; /* تقليل الحشوة الداخلية */
            border: none;
            border-radius: 16px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            text-decoration: none;
            transition: all var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            background: rgba(255, 255, 255, 0.1); 
        }

        .social-btn svg {
            width: 22px;
            height: 22px;
            margin-left: 10px;
            fill: currentColor;
            transition: transform var(--transition-speed);
        }

        .social-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            color: #fff;
        }

        .social-btn:hover svg {
            transform: scale(1.2) rotate(5deg);
        }

        .social-btn:active {
            transform: scale(0.98);
        }

        /* تخصيص ألوان كل منصة */
        .whatsapp { background: linear-gradient(135deg, #25D366 0%, #128C7E 100%); }
        .whatsapp:hover { box-shadow: 0 0 20px rgba(37, 211, 102, 0.4); }

        .facebook { background: linear-gradient(135deg, #1877F2 0%, #105db5 100%); }
        .facebook:hover { box-shadow: 0 0 20px rgba(24, 119, 242, 0.4); }

        .telegram { background: linear-gradient(135deg, #0088cc 0%, #006699 100%); }
        .telegram:hover { box-shadow: 0 0 20px rgba(0, 136, 204, 0.4); }

        .instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .instagram:hover { box-shadow: 0 0 20px rgba(225, 48, 108, 0.4); }

        /* أزرار جديدة */
        .viber { background: linear-gradient(135deg, #7360f2 0%, #5944c5 100%); }
        .viber:hover { box-shadow: 0 0 20px rgba(115, 96, 242, 0.4); }

        .gmail { background: linear-gradient(135deg, #EA4335 0%, #c5221f 100%); }
        .gmail:hover { box-shadow: 0 0 20px rgba(234, 67, 53, 0.4); }

        .footer-note {
            margin-top: 20px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
        }

        @keyframes slideUpFade {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 100;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>

    <script>
        function openLink(url, platform) {
            showToast(`جاري فتح ${platform}...`);
            setTimeout(() => {
                window.open(url, '_blank');
            }, 300);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        
        const properties = {
            bgColor: 'rgba(15, 23, 42, 1)',
            particleColor: 'rgba(255, 255, 255, 0.3)',
            particleRadius: 2,
            particleCount: 60,
            lineLength: 150,
            particleSpeed: 0.5,
        };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.velocityX = Math.random() * (properties.particleSpeed * 2) - properties.particleSpeed;
                this.velocityY = Math.random() * (properties.particleSpeed * 2) - properties.particleSpeed;
                this.life = Math.random() * 100;
            }

            position() {
                this.x + this.velocityX > width && this.velocityX > 0 || this.x + this.velocityX < 0 && this.velocityX < 0 ? this.velocityX *= -1 : this.velocityX;
                this.y + this.velocityY > height && this.velocityY > 0 || this.y + this.velocityY < 0 && this.velocityY < 0 ? this.velocityY *= -1 : this.velocityY;
                this.x += this.velocityX;
                this.y += this.velocityY;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, properties.particleRadius, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fillStyle = properties.particleColor;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            let count = window.innerWidth < 600 ? 30 : properties.particleCount;
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        function drawLines() {
            let x1, y1, x2, y2, length, opacity;
            for (let i in particles) {
                for (let j in particles) {
                    x1 = particles[i].x;
                    y1 = particles[i].y;
                    x2 = particles[j].x;
                    y2 = particles[j].y;
                    length = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
                    
                    if (length < properties.lineLength) {
                        opacity = 1 - length / properties.lineLength;
                        ctx.lineWidth = '0.5';
                        ctx.strokeStyle = `rgba(255, 255, 255, ${opacity * 0.2})`;
                        ctx.beginPath();
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x2, y2);
                        ctx.stroke();
                    }
                }
            }
        }

        function loop() {
            ctx.clearRect(0, 0, width, height);
            for (let i in particles) {
                particles[i].position();
                particles[i].draw();
            }
            drawLines();
            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', () => {
            resize();
            initParticles();
        });
        
        resize();
        initParticles();
        loop();
    </script>
